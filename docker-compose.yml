version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: rti-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: orderAccumulator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  order-accumulator:
    build:
      context: .
      dockerfile: src/RTI.OrderAccumulator/Dockerfile
    container_name: rti-order-accumulator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://*:5002
      - FIX_PORT=5003
      - ConnectionStrings__TradingDatabase=Host=postgres;Port=5432;Database=orderAccumulator;Username=postgres;Password=postgres
    ports:
      - "5002:5002"   # API Web
      - "5003:5003"   # FIX
    restart: unless-stopped

  order-generator:
    build:
      context: .
      dockerfile: src/RTI.OrderGenerator/Dockerfile
    container_name: rti-order-generator
    depends_on:
      - order-accumulator
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5001
      - FIX_CONNECT_HOST=order-accumulator
      - FIX_CONNECT_PORT=5003
    ports:
      - "5001:5001"
    restart: unless-stopped

volumes:
  postgres-data: